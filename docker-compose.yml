services:
  directus-dev:
    container_name: directus
    profiles: [dev]
    build:
      context: ./directus
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      directus-db-dev:
        condition: service_healthy
    ports:
      - 8055:8055
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus-config:/directus/directus-config
    restart: unless-stopped
    environment:
      PUBLIC_URL: ${DIRECTUS_URL}
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN}
      DB_CLIENT: "pg"
      DB_HOST: "directus-db-dev"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "directus"
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD}
      COLLECTIVO_API_URL: ${COLLECTIVO_API_URL}
      COLLECTIVO_API_TOKEN: ${COLLECTIVO_API_TOKEN}
      FLOWS_ENV_ALLOW_LIST: "PUBLIC_URL,COLLECTIVO_API_URL,COLLECTIVO_API_TOKEN"

  directus-db-dev:
    container_name: directus-db
    profiles: [dev]
    image: postgis/postgis:16-3.4-alpine
    volumes:
      - directus-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: "directus"
      POSTGRES_USER: "directus"
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD}

  keycloak:
    container_name: keycloak
    build: ./keycloak
    profiles: [keycloak]
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: public
      KC_DB_URL_DATABASE: "keycloak"
      KC_DB_URL_HOST: ${KEYCLOAK_DB_HOST}
      KC_DB_URL_PORT: 5432
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN}
      # dev settings
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY: ${KEYCLOAK_PROXY:-none}
    command: ${KEYCLOAK_COMMAND:-start --optimized}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./keycloak/themes/collectivo:/opt/keycloak/themes/collectivo
    restart: unless-stopped
    networks:
      - default

  keycloak-db:
    container_name: keycloak-db
    profiles: [keycloak]
    image: postgres:14-alpine
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

  nextcloud:
    container_name: nextcloud
    profiles: [nextcloud]
    image: nextcloud:stable
    restart: always
    ports:
      - 8081:80
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpass
    volumes:
      - ./nextcloud_data:/var/www/html
    depends_on:
      nextcloud-db:
        condition: service_healthy

  nextcloud-db:
    container_name: nextcloud-db
    profiles: [nextcloud]
    image: mariadb:11 # lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloudpass
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 20s
    volumes:
      - ./nextcloud_db_data:/var/lib/mysql

volumes:
  directus-db-data:
  keycloak-db-data:
